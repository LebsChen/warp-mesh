# warp-mesh node (落地节点)
# 接受 mesh 连入，出口到外网（或转发到下一跳）
# 使用场景：US VPS 等有公网 IP 的机器
services:
  warp-mesh:
    image: warp-mesh:latest
    container_name: warp-mesh
    restart: unless-stopped
    privileged: true
    network_mode: host
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - warp-data:/var/lib/cloudflare-warp
    environment:
      - CONNECTOR_TOKEN=${CONNECTOR_TOKEN}
      - WARP_ROLE=node
      # - GOST_REMOTE=socks5://next-hop-mesh-ip:1080  # 可选：转发到下一跳
      # - GOST_USER=user                               # 可选：认证
      # - GOST_PASS=pass
    cap_add:
      - NET_ADMIN

volumes:
  warp-data:
