# warp-mesh node (落地节点)
# 接受 mesh 连入，出口到外网（或转发到下一跳）
services:
  warp-mesh:
    image: warp-mesh:latest
    container_name: warp-mesh
    restart: unless-stopped
    privileged: true
    network_mode: host
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - warp-data:/var/lib/cloudflare-warp
    environment:
      - CONNECTOR_TOKEN=${CONNECTOR_TOKEN}
      - WARP_ROLE=node
      # 转发到下一跳（可选，如 US VPS 的 mesh IP）
      # - GOST_REMOTE=socks5://100.96.0.12:1080
      # 认证（可选）
      # - GOST_USER=user
      # - GOST_PASS=pass
    cap_add:
      - NET_ADMIN

volumes:
  warp-data:
