# ============================================================
# Node (落地节点) — US VPS / 出口节点
#
# 特点：GOST 对外监听，接受 mesh 连入，出口到外网
# ============================================================
services:
  warp-mesh:
    image: warp-mesh:latest
    container_name: warp-mesh
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
    environment:
      # --- 角色 ---
      - WARP_ROLE=node

      # --- WARP Connector Token（必需） ---
      - CONNECTOR_TOKEN=eyJ...

      # --- GOST 配置 ---
      - GOST_CONFIG=/etc/gost/gost.yaml

      # --- MDM 组织配置（也可通过 mdm.xml 文件配置） ---
      # - GOST_BIND=0.0.0.0
      # - GOST_SOCKS_PORT=1080
      # - GOST_HTTP_PORT=8080
      # - GOST_USER=admin         # 认证用户名
      # - GOST_PASS=secret        # 认证密码

      # --- WARP 连接 ---
      # - WARP_AUTO_CONNECT=true
      # - WARP_SLEEP=5
      # - WARP_MODE=warp
      # - WARP_PROTOCOL=WireGuard

    volumes:
      # WARP 数据持久化（保持 mesh IP 稳定）
      - warp-data:/var/lib/cloudflare-warp
      # GOST 配置文件（不存在时自动生成，存在则使用宿主机版本）
      - ./gost:/etc/gost
    ports:
      - "1080:1080"  # SOCKS5
      - "8080:8080"  # HTTP proxy

volumes:
  warp-data:
