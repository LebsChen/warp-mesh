# ============================================================
# Client (本地节点) — 本地透明代理 + 转发到落地/中转
#
# 特点：GOST 仅本地监听 + 透明代理 + 转发到下一跳
#       默认启用 iptables 透明代理劫持所有 TCP 流量
# ============================================================
services:
  warp-mesh:
    image: warp-mesh:latest
    container_name: warp-mesh
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv4.ip_forward=1
    environment:
      # --- 角色 ---
      - WARP_ROLE=client

      # --- WARP Connector Token（必需） ---
      - CONNECTOR_TOKEN=eyJ...

      # --- GOST 配置 ---
      - GOST_CONFIG=/etc/gost/gost.yaml

      # --- GOST 转发目标（gost.yaml 不存在时自动生成用） ---
      # 格式：[protocol://][user:pass@]host:port
      # - GOST_REMOTE=socks5://100.96.0.12:1080

      # --- 透明代理（client 默认启用） ---
      # - WARP_TRANSPARENT=true
      # - GOST_REDIRECT_PORT=12345

      # --- WARP 连接 ---
      # - WARP_MODE=warp
      # - WARP_PROTOCOL=WireGuard

    volumes:
      # WARP 数据持久化
      - warp-data:/var/lib/cloudflare-warp
      # GOST 配置文件
      - ./gost:/etc/gost

    network_mode: host

volumes:
  warp-data:
