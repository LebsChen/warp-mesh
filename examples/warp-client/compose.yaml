# warp-mesh client (本地客户端)
# 本地 SOCKS5 + HTTP 代理，转发到 mesh 下一跳
services:
  warp-mesh:
    image: warp-mesh:latest
    container_name: warp-mesh
    restart: unless-stopped
    privileged: true
    network_mode: host
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - warp-data:/var/lib/cloudflare-warp
    environment:
      - CONNECTOR_TOKEN=${CONNECTOR_TOKEN}
      - WARP_ROLE=client
      - GOST_REMOTE=socks5://${NEXT_HOP:-100.96.0.16:1080}
      - GOST_LOCAL_BIND=127.0.0.1
      # ⚠️ 透明代理（会劫持所有 TCP 流量，谨慎启用）
      # - WARP_TRANSPARENT=true
    cap_add:
      - NET_ADMIN

volumes:
  warp-data:
