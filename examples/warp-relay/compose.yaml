# warp-mesh relay (中转节点)
# 接受 mesh 连入 + 转发到下一跳
services:
  warp-mesh:
    image: warp-mesh:latest
    container_name: warp-mesh
    restart: unless-stopped
    privileged: true
    network_mode: host
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - warp-data:/var/lib/cloudflare-warp
    environment:
      - CONNECTOR_TOKEN=${CONNECTOR_TOKEN}
      - WARP_ROLE=relay
      - GOST_REMOTE=socks5://${NEXT_HOP:-100.96.0.12:1080}
    cap_add:
      - NET_ADMIN

volumes:
  warp-data:
