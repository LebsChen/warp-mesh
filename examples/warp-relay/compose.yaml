# ============================================================
# Relay (中转节点) — 接受 mesh 连入 + 转发到下一跳
#
# 特点：GOST 对外监听 + 转发，用于国内中转
# ============================================================
services:
  warp-mesh:
    image: warp-mesh:latest
    container_name: warp-mesh
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
    environment:
      # --- 角色 ---
      - WARP_ROLE=relay

      # --- WARP Connector Token（必需） ---
      - CONNECTOR_TOKEN=eyJ...

      # --- GOST 配置 ---
      - GOST_CONFIG=/etc/gost/gost.yaml

      # --- GOST 转发目标（gost.yaml 不存在时自动生成用） ---
      # 格式：[protocol://][user:pass@]host:port
      # - GOST_REMOTE=socks5://100.96.0.12:1080

      # --- GOST 认证（保护中转节点） ---
      # - GOST_USER=admin
      # - GOST_PASS=secret

      # --- WARP 连接 ---
      # - WARP_MODE=warp
      # - WARP_PROTOCOL=WireGuard

    volumes:
      # WARP 数据持久化
      - warp-data:/var/lib/cloudflare-warp
      # GOST 配置文件
      - ./gost:/etc/gost
    ports:
      - "1080:1080"
      - "8080:8080"

volumes:
  warp-data:
