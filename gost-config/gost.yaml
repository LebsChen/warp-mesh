# GOST 配置文件 - warp-node 默认配置
# SOCKS5 + HTTP 代理服务

services:
  - name: socks5-service
    addr: ":1080"
    handler:
      type: socks5
      chain: ""
    listener:
      type: tcp
  
  - name: http-service
    addr: ":8080"
    handler:
      type: http
      chain: ""
    listener:
      type: tcp

log:
  level: info
  format: text
  output: stdout
